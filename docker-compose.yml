services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.23
    environment:
      - ANONYMIZED_TELEMETRY=False
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    # LLM keys and DEMO_MODE come only from ./.env (not from host shell — avoids leaked export overriding .env)
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # solo pool: metrics and tasks share one process so Prometheus sees job counters (prefork hides child metrics).
    command: celery -A app.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      # Use host gateway so the UI reaches the published API port even when in-container DNS
      # for the service name "api" fails (some Docker Desktop / VPN setups).
      API_BASE_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # 19090 avoids clash with another Prometheus or app already using 9090 on the host
      - "19090:9090"
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  chroma_data:
